name: Auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dependabot-auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' && !github.event.pull_request.draft
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2

      # Match rules from auto-merge.yml:
      # - production deps: patch only
      # - production deps: security minor
      # - dev deps: minor and below
      - name: Enable auto-merge if update qualifies
        if: |
          (steps.meta.outputs.update-type == 'version-update:semver-patch') ||
          (steps.meta.outputs.update-type == 'version-update:semver-minor' &&
           steps.meta.outputs.dependency-type == 'direct:development') ||
          (steps.meta.outputs.update-type == 'version-update:semver-minor' &&
           steps.meta.outputs.alert-state == 'OPEN')
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-please-auto-merge:
    runs-on: ubuntu-latest
    if: |
      !github.event.pull_request.draft &&
      github.event.pull_request.user.login == 'github-actions[bot]' &&
      startsWith(github.event.pull_request.title, 'chore(main): release ') &&
      contains(join(github.event.pull_request.labels.*.name, ','), 'automerge-release')
    steps:
      - name: Enable auto-merge for labeled release PRs
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
