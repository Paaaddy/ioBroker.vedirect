<html>

<head>

	<!-- Load ioBroker scripts and styles-->
	<link rel="stylesheet" type="text/css" href="../../css/adapter.css" />
	<link rel="stylesheet" type="text/css" href="../../lib/css/materialize.css">

	<script type="text/javascript" src="../../lib/js/jquery-3.2.1.min.js"></script>
	<script type="text/javascript" src="../../socket.io/socket.io.js"></script>

	<script type="text/javascript" src="../../js/translate.js"></script>
	<script type="text/javascript" src="../../lib/js/materialize.js"></script>
	<script type="text/javascript" src="../../js/adapter-settings.js"></script>

	<!-- Load our own files -->
	<link rel="stylesheet" type="text/css" href="style.css" />
	<script type="text/javascript" src="words.js"></script>

	<script type="text/javascript">
		const deviceFieldIds = ['device1Path', 'device2Path', 'device3Path'];

		function getDefaultDevicesFromLegacy(settings) {
			if (!settings) {
				return [];
			}

			const configuredFields = deviceFieldIds
				.map((fieldId, index) => ({
					id: `device${index + 1}`,
					path: settings[fieldId] || '',
					baudRate: 19200,
					enabled: true,
					messageBuffer: Number(settings.messageBuffer) || 0,
					expireTime: Number(settings.expireTime) || 0
				}))
				.filter(device => !!device.path);
			if (configuredFields.length > 0) {
				return configuredFields;
			}

			if (!settings.USBDevice) {
				return [];
			}

			return [{
				id: 'device1',
				path: settings.USBDevice,
				baudRate: 19200,
				enabled: true,
				messageBuffer: Number(settings.messageBuffer) || 0,
				expireTime: Number(settings.expireTime) || 0
			}];
		}

		// This will be called by the admin adapter when the settings page loads
		function load(settings, onChange) {
			// example: select elements with id=key and class=value and insert value
			if (!settings) return;
			$('.value').each(function () {
				var $key = $(this);
				var id = $key.attr('id');
				if ($key.attr('type') === 'checkbox') {
					// do not call onChange direct, because onChange could expect some arguments
					$key.prop('checked', settings[id])
						.on('change', () => onChange())
						;
				} else {
					// do not call onChange direct, because onChange could expect some arguments
					$key.val(settings[id])
						.on('change', () => onChange())
						.on('keyup', () => onChange())
						;
				}
			});

			const devices = Array.isArray(settings.devices) ? settings.devices : getDefaultDevicesFromLegacy(settings);
			deviceFieldIds.forEach((fieldId, index) => {
				const device = devices[index];
				$(`#${fieldId}`)
					.val((device && device.path) || '')
					.on('change', () => onChange())
					.on('keyup', () => onChange());
			});

			onChange(false);
			// reinitialize all the Materialize labels on the page if you are dynamically adding inputs:
			if (M) M.updateTextFields();
		}

		// This will be called by the admin adapter when the user presses the save button
		function save(callback) {
			// example: select elements with class=value and build settings object
			var obj = {};
			$('.value').each(function () {
				var $this = $(this);
				if ($this.attr('type') === 'checkbox') {
					obj[$this.attr('id')] = $this.prop('checked');
				} else {
					obj[$this.attr('id')] = $this.val();
				}
			});
			obj.devices = deviceFieldIds
				.map((fieldId, index) => ({
					id: `device${index + 1}`,
					path: (`${obj[fieldId] || ''}`).trim(),
					baudRate: 19200,
					enabled: true,
					messageBuffer: Number(obj.messageBuffer) || 0,
					expireTime: Number(obj.expireTime) || 0
				}))
				.filter(device => !!device.path);
			obj.USBDevice = obj.device1Path || (obj.devices[0] ? obj.devices[0].path : '');
			callback(obj);
		}
	</script>

</head>

<body>

	<div class="m adapter-container">
		<div class="row">
			<div class="col s12 m4 l2">
				<img src="vedirect.png" class="logo">
			</div>
		</div>

		<p class="translate title">Please choose your preferred settings</p>

		<div class="row">

			<div class="input-field col s3">
				<!--	placeholder	-->
			</div>

			<div class="input-field col s4">
				<input placeholder="Example : /dev/ttyUSB0" id="device1Path" type="text" class="value">
				<label for="device1Path" class="translate">device1Path</label>
			</div>

			<div class="input-field col s4">
				<input placeholder="Optional : /dev/ttyUSB1" id="device2Path" type="text" class="value">
				<label for="device2Path" class="translate">device2Path</label>
			</div>

			<div class="input-field col s4">
				<input placeholder="Optional : /dev/ttyUSB2" id="device3Path" type="text" class="value">
				<label for="device3Path" class="translate">device3Path</label>
			</div>

			<div class="input-field col s3">
				<input placeholder="Leave empty or 0 to not expire states" id="expireTime" type="number" class="value">
				<label for="expireTime" class="translate">expireTime</label>
			</div>

			<div class="input-field col s3">
				<input placeholder="Fast states write window in seconds" id="fastStateInterval" type="number" class="value">
				<label for="fastStateInterval" class="translate">fastStateInterval</label>
			</div>

			<div class="input-field col s3">
				<input placeholder="Normal states write window in seconds" id="normalStateInterval" type="number" class="value">
				<label for="normalStateInterval" class="translate">normalStateInterval</label>
			</div>

			<div class="input-field col s3">
				<input placeholder="Slow states write window in seconds" id="slowStateInterval" type="number" class="value">
				<label for="slowStateInterval" class="translate">slowStateInterval</label>
			</div>

		</div>

	</div>

</body>

</html>
